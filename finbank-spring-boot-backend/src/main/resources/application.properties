# Application Name
spring.application.name=finbank-backend

  # Database Configuration (PostgreSQL)

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/finbank}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

  # HikariCP Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.pool-name=FinBankHikariPool

  # Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

  # Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.time-to-live=3600000

  # Logging Configuration
logging.level.root=INFO
logging.level.com.finbank=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

  # JWT Configuration
app.security.jwt.secret-key=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.security.jwt.expiration-ms=86400000
app.security.jwt.refresh-token-expiration-ms=604800000

  # OTP Configuration
app.security.otp.expiration-minutes=5